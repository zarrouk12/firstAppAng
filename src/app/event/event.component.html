<div class="page-container">
  <div class="toolbar">
    <h1 class="page-title">Events</h1>
    <button mat-raised-button color="primary" (click)="open()">
      <mat-icon>add</mat-icon>
      Create New
    </button>
  </div>

  <mat-form-field class="filter-field" appearance="outline">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-container mat-elevation-z4">
    <table mat-table [dataSource]="dataSource" matSort>

      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Titre Column -->
      <ng-container matColumnDef="Titre">
        <th mat-header-cell *matHeaderCellDef> Titre </th>
        <td mat-cell *matCellDef="let element"> {{element.Titre}} </td>
      </ng-container>

      <!-- DateDebut Column -->
      <ng-container matColumnDef="DateDebut">
        <th mat-header-cell *matHeaderCellDef> Date Début </th>
        <td mat-cell *matCellDef="let element"> {{element.DateDebut | date:'yyyy-MM-dd'}} </td>
      </ng-container>

      <!-- DateFin Column -->
      <ng-container matColumnDef="DateFin">
        <th mat-header-cell *matHeaderCellDef> Date Fin </th>
        <td mat-cell *matCellDef="let element"> {{element.DateFin | date:'yyyy-MM-dd'}} </td>
      </ng-container>

      <!-- Lieu Column -->
      <ng-container matColumnDef="Lieu">
        <th mat-header-cell *matHeaderCellDef> Lieu </th>
        <td mat-cell *matCellDef="let element"> {{element.Lieu}} </td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="Action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let element">
          <mat-icon (click)="OpenEdit(element.id)">edit</mat-icon>
          <mat-icon (click)="deleteEvent(element)">delete</mat-icon>
          <mat-icon (click)="viewEvent(element)">visibility</mat-icon>
          <mat-icon (click)="affectEvent(element)">assignment_ind</mat-icon>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>
</div>
